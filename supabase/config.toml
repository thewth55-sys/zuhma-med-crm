# Config as code para Supabase — ver:
# https://supabase.com/docs/guides/local-development/cli/config
#
# El objetivo real de este archivo son las 6 plantillas de correo de
# Auth (`auth.email.template.*`) al final. Las secciones [auth],
# [auth.email] y [auth.mfa.totp] de arriba NO son cambios que
# queramos — son los valores EXACTOS que ya están en el proyecto real
# (confirmados contra el diff de un primer intento de
# `supabase config push`, cancelado antes de aplicar). Sin declararlos
# aquí, el CLI los compara contra sus defaults de desarrollo local
# (site_url=127.0.0.1, MFA/confirmaciones desactivadas, otp_length=6)
# y los REEMPLAZA — eso habría roto el login en producción. Las
# declaramos explícitamente solo para que el diff quede en cero ahí.
#
# Si en algún momento cambias alguno de estos valores desde el
# Dashboard de Supabase (Authentication → URL Configuration, etc.),
# actualiza también aquí — si no, el próximo `config push` los
# revertiría al valor que quedó escrito en este archivo.
#
# IMPORTANTE antes de correr `supabase config push`:
#   1. `supabase link --project-ref <tu-project-ref>`
#   2. El CLI muestra un diff local vs. remoto antes de aplicar nada.
#   3. Verifica que el diff SOLO muestre cambios en las 6 plantillas de
#      correo. Si aparece cualquier otro cambio (site_url, proveedores,
#      SMTP, rate limits, etc.), CANCELA (Ctrl+C / responde "no") —
#      significa que el proyecto remoto cambió algo que este archivo
#      todavía no refleja.
project_id = "zuhma-med-crm"

[auth]
site_url = "https://app.zuhma.com/"
additional_redirect_urls = ["https://app.zuhma.com/**", "https://app.zuhma.com/auth/callback"]

[auth.email]
enable_confirmations = true
otp_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email.template.confirmation]
subject = "Confirma tu cuenta en Zuhma Med CRM"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Restablece tu contraseña — Zuhma Med CRM"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Tu enlace de acceso a Zuhma Med CRM"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.invite]
subject = "Te invitaron a unirte a Zuhma Med CRM"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirma tu nuevo correo — Zuhma Med CRM"
content_path = "./supabase/templates/email_change.html"

[auth.email.template.reauthentication]
subject = "Tu código de verificación — Zuhma Med CRM"
content_path = "./supabase/templates/reauthentication.html"
