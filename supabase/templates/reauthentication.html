<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body style="margin:0; padding:0; background-color:#f4f4f5; font-family: Helvetica, Arial, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5; padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; max-width:560px; width:100%;">
            <tr>
              <td style="background-color:#f94b5a; height:6px; line-height:6px; font-size:0;">&nbsp;</td>
            </tr>
            <tr>
              <td style="padding:28px 32px 0 32px;">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="vertical-align:middle;">
                      <img src="https://medcrm.zuhma.online/zuhma-logo.png" width="116" height="35" alt="Zuhma" style="display:block;" />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 32px 8px 32px;">
                <h1 style="margin:0 0 16px 0; font-size:20px; color:#1a1a1a;">Tu código de verificación</h1>
                <div style="font-size:14px; line-height:1.6; color:#333;">
                  <p>Usa este código para confirmar tu identidad en Zuhma:</p><p style="margin:20px 0; text-align:center;"><span style="display:inline-block; padding:14px 28px; background-color:#f4f4f5; border:1px solid #e5e5e5; border-radius:8px; font-size:28px; font-weight:700; letter-spacing:6px; color:#a83240;">{{ .Token }}</span></p><p>Este código expira en unos minutos. Si no lo solicitaste, ignora este correo — tu cuenta sigue segura.</p>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 32px 28px 32px; border-top:1px solid #eee; margin-top:16px;">
                <p style="margin:16px 0 0 0; font-size:11px; color:#999;">
                  Este es un correo automático de Zuhma, no es necesario responder.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
