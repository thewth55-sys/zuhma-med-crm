<?xml version="1.0" encoding="UTF-8"?>
<!--
  WhatsApp-style doodle background for the inbox message area.

  Design notes:
  - 240x240 tile, repeats seamlessly via CSS background-repeat. Icons stay
    inside a (10, 10) → (217, 217) safe zone so the tile boundary always
    falls in empty space; no icon is ever cut in half by a seam.
  - Icon shapes are taken verbatim from lucide-react (which the app already
    ships) so they sit visually consistent with every other icon in the UI.
  - Icon SET is deliberately restricted to communication/care/scheduling
    themes (message, phone, calendar, heart, mail, check, star, smile,
    users, lightbulb, globe) — a generic-SaaS "growth" icon set (dollar
    sign, trophy, shopping cart, rocket, percent, briefcase, bar chart)
    read as visual noise against a patient-messaging context and didn't
    fit a medical/dental CRM. 7 of the original 18 slots were re-skinned
    with repeats of the fitting shapes above (position/scale/rotation of
    each slot kept identical — only which icon renders there changed) —
    a tileable texture reads better with a smaller, cohesive icon set
    than 18 one-off shapes anyway.
  - Stroke color is slate-500 (#64748b) at 9% opacity — low enough to read
    as a soft texture rather than a foreground-competing pattern on either
    a near-black (dark mode) or near-white (light mode) background; this
    file is shared by both themes (no CSS var support in a referenced
    background-image asset).
  - All shapes use stroke + fill:none + round caps to match the lucide
    line-art style.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" fill="none" stroke="#64748b" stroke-opacity="0.09" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

  <!-- 1. MessageSquare @ (30,22) s=0.95 -->
  <g transform="translate(30 22) scale(0.95)">
    <path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/>
  </g>

  <!-- 2. Phone @ (95,18) s=0.85 r=-12 -->
  <g transform="translate(95 18) scale(0.85) rotate(-12 12 12)">
    <path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/>
  </g>

  <!-- 3. Star @ (160,28) s=0.75 -->
  <g transform="translate(160 28) scale(0.75)">
    <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"/>
  </g>

  <!-- 4. Heart @ (200,28) s=0.7 r=8 -->
  <g transform="translate(200 28) scale(0.7) rotate(8 12 12)">
    <path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/>
